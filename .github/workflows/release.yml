name: Release to Git Branch and Create GitHub Release

on:
  workflow_run:
    workflows: ["QPDF WASM Build"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: Production
    strategy:
      matrix:
        lock_type: [dev, prod]
    name: Release (${{ matrix.lock_type }})

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v6

      - name: Setup SSH agent for compilation target
        if: ${{ matrix.lock_type == 'dev' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SOURCE_DEPLOY_KEY }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: qpdf-wasm-build-${{ github.event.workflow_run.run_number }}-${{ matrix.lock_type }}
          path: artifacts/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_INFO="artifacts/build-info.json"
          PRODUCT_LOCK=$(jq -r '.product_lock' "$BUILD_INFO")
          BUILD_TIMESTAMP=$(jq -r '.build_timestamp' "$BUILD_INFO")
          GIT_COMMIT=$(jq -r '.git_commit' "$BUILD_INFO")
          RUN_NUMBER=$(jq -r '.workflow_run_number' "$BUILD_INFO")

          SHORT_COMMIT=${GIT_COMMIT:0:7}

          if [[ "$PRODUCT_LOCK" == "1" ]]; then
            VERSION="0.4.0-${SHORT_COMMIT}"
            BUILD_MODE="release (production lock)"
            BRANCH_NAME="release"
            TAG_NAME="v${VERSION}"
            IS_PRERELEASE="false"
            TITLE="QPDF WASM $VERSION"
            REMOTE_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          else
            VERSION="0.4.0-${SHORT_COMMIT}-dev"
            BUILD_MODE="dev (unlocked)"
            BRANCH_NAME="release-dev"
            TAG_NAME="v${VERSION}"
            IS_PRERELEASE="true"
            TITLE="QPDF WASM $VERSION (Development Build)"
            REMOTE_URL="git@github.com:${{ secrets.SOURCE_REPOSITORY }}.git"
          fi

          # CRITICAL SAFETY CHECK: Block push to main branch
          if [[ -z "$BRANCH_NAME" || "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == *"main"* ]]; then
            echo "::error::Attempted to force push to main branch! Aborting."
            exit 1
          fi

          RELEASE_TEMP="release_temp"
          rm -rf "$RELEASE_TEMP"
          mkdir -p "$RELEASE_TEMP/dist"

          # Copy artifact to dist/ subdirectory
          cp -r artifacts/* "$RELEASE_TEMP/dist/"

          # Move package.json to release root (npm needs it at root)
          mv "$RELEASE_TEMP/dist/package.json" "$RELEASE_TEMP/" 2>/dev/null || true

          # Generate minimal README (don't expose upstream details)
          printf '# QPDF WASM\n\nWebAssembly distribution package for QPDF.\n' > "$RELEASE_TEMP/README.md"

          (
            cd "$RELEASE_TEMP"
            git init
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git checkout -b "$BRANCH_NAME"

            git add .
            git commit -F- <<EOF
          chore: release QPDF WASM build

          Build Mode: ${BUILD_MODE}
          Version: ${VERSION}
          Commit: ${GIT_COMMIT}
          Timestamp: ${BUILD_TIMESTAMP}
          EOF

            git remote add origin "$REMOTE_URL"
            git push --force origin "$BRANCH_NAME"

            # Tag management
            if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
              git push origin --delete "$TAG_NAME" || true
            fi
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          )

          # Only publish public GitHub Releases for production builds
          if [[ "$PRODUCT_LOCK" == "1" ]]; then
            PRERELEASE_FLAG=""
            if [ "$IS_PRERELEASE" == "true" ]; then
              PRERELEASE_FLAG="--prerelease"
            fi

            gh release delete "$TAG_NAME" -y --cleanup-tag || true
            gh release create "$TAG_NAME" \
              $PRERELEASE_FLAG \
              --title "$TITLE" \
              --notes-file - <<EOF
          # QPDF WASM Build

          This is an automated compilation output of QPDF WebAssembly module with production domain lock enabled.

          - **Version**: $VERSION
          - **Commit**: $GIT_COMMIT
          - **Build Mode**: $BUILD_MODE
          - **Timestamp**: $BUILD_TIMESTAMP
          EOF
          fi
