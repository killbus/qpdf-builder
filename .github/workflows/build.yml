name: QPDF WASM Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    concurrency: qpdf-build-${{ github.ref }}-${{ matrix.build_type }}
    runs-on: ubuntu-latest
    environment: Production
    strategy:
      matrix:
        build_type: [dev, prod]
    name: Build (${{ matrix.build_type }})
    env:
      EMSDK: /opt/emsdk
      EM_CACHE: /opt/emsdk/upstream/emscripten/cache
      EM_CONFIG: /opt/emsdk/.emscripten

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v6

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SOURCE_REPOSITORY }}" ]; then
            echo "::error::SOURCE_REPOSITORY secret is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.SOURCE_DEPLOY_KEY }}" ]; then
            echo "::error::SOURCE_DEPLOY_KEY secret is not configured"
            exit 1
          fi

      - name: Checkout compilation source
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.SOURCE_REPOSITORY }}
          ssh-key: ${{ secrets.SOURCE_DEPLOY_KEY }}
          path: qpdf-wasm-src

      # ============ Cache Strategy ============
      - name: Restore Emscripten SDK cache
        id: cache-emsdk
        uses: actions/cache/restore@v4
        with:
          path: /opt/emsdk
          key: emsdk-3.1.74-${{ runner.os }}-v1

      # ============ System Dependencies ============
      - name: Install base system packages
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config autoconf automake libtool ragel git yasm \
            subversion lsb-release tzdata tini \
            curl build-essential rsync python3 python3-pip
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ============ Emscripten SDK ============
      - name: Install Emscripten SDK 3.1.74
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/emsdk
          sudo chown $USER:$USER /opt/emsdk
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git /opt/emsdk
          cd /opt/emsdk
          ./emsdk install 3.1.74 --shallow
          ./emsdk activate 3.1.74

      - name: Setup Emscripten environment
        run: |
          cd /opt/emsdk
          source ./emsdk_env.sh
          echo "/opt/emsdk" >> $GITHUB_PATH
          echo "/opt/emsdk/upstream/emscripten" >> $GITHUB_PATH
          echo "/opt/emsdk/upstream/bin" >> $GITHUB_PATH
          echo "EMSDK=$EMSDK" >> $GITHUB_ENV
          echo "EM_CONFIG=$EM_CONFIG" >> $GITHUB_ENV
          emcc --version

      # ============ Build ============
      - name: Build QPDF WASM
        env:
          PRODUCT_LOCK: ${{ matrix.build_type == 'prod' && '1' || '0' }}
          QPDF_REPO_URL: ${{ secrets.QPDF_REPO_URL }}
        run: |
          cd qpdf-wasm-src
          mkdir -p lib

          chmod +x shallow-clone.sh

          ./shallow-clone.sh https://github.com/madler/zlib.git lib/zlib 21767c654d31d2dccdde4330529775c6c5fd5389
          ./shallow-clone.sh https://github.com/ImageMagick/jpeg-turbo.git lib/jpeg-turbo 7aa2a898c564041a24b09d0a6e780aaa632d08d3
          ./shallow-clone.sh ${QPDF_REPO_URL}.git lib/qpdf 03968ad89f409c6cad03978cdc91cb3cd74f82a3

          bash build.sh

          cp types/qpdf.d.ts dist/qpdf.d.ts

      # ============ Artifacts ============
      - name: Generate build info and package files
        run: |
          cd qpdf-wasm-src
          mkdir -p dist
          echo '{
            "product_lock": "${{ matrix.build_type == 'prod' && '1' || '0' }}",
            "build_mode": "${{ matrix.build_type }}",
            "build_timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "workflow_run_id": "${{ github.run_id }}",
            "workflow_run_number": "${{ github.run_number }}",
            "git_commit": "'${{ github.sha }}'"
          }' > dist/build-info.json

          # Include package.json for release
          cp package.json dist/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qpdf-wasm-build-${{ github.run_number }}-${{ matrix.build_type }}
          path: qpdf-wasm-src/dist/
          retention-days: 7
          compression-level: 9

      # ============ Save Cache ============
      - name: Save Emscripten SDK cache
        uses: actions/cache/save@v4
        if: always() && steps.cache-emsdk.outputs.cache-hit != 'true'
        with:
          path: /opt/emsdk
          key: emsdk-3.1.74-${{ runner.os }}-v1
